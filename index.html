<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>La Floristería de Bárbara</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;1,500&display=swap" rel="stylesheet">
    <style>
        :root {
            --fondo-rosado: #FFF0F5;
            --rosa-claro: #FCE4EC;
            --blush: #F48FB1;
            --texto: #704F4F;
            --radius: 20px;
            --gap: 12px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--fondo-rosado);
            color: var(--texto);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            overflow-x: hidden;
        }

        /* --- Animaciones --- */
        @keyframes headerFloat {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
        }

        @keyframes fall {
            0% { transform: translateY(-10vh) rotate(0deg); opacity: 0; }
            10% { opacity: 0.8; }
            100% { transform: translateY(110vh) rotate(720deg); opacity: 0; }
        }

        @keyframes roseShake {
            0%, 100% { transform: scale(1) rotate(0); }
            25% { transform: scale(1.1) rotate(-8deg); }
            75% { transform: scale(1.1) rotate(8deg); }
        }

        .logo-container {
            padding: 30px 20px 10px;
            text-align: center;
            background: var(--fondo-rosado);
            position: relative;
            z-index: 10;
            animation: headerFloat 5s ease-in-out infinite;
        }

        .header-content {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            margin-bottom: 12px;
        }

        /* --- Rosas Solicitadas --- */
        .side-rose {
            width: 70px; /* Tamaño optimizado para la imagen proporcionada */
            height: auto;
            cursor: pointer;
            user-select: none;
            transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            filter: drop-shadow(0 4px 8px rgba(0,0,0,0.1));
        }

        .side-rose.shaking {
            animation: roseShake 0.15s ease-in-out infinite;
        }

        .logo-placeholder {
            width: 110px;
            height: 110px;
            background-color: white;
            border-radius: 50%;
            border: 2px solid var(--blush);
            overflow: hidden;
            box-shadow: 0 8px 20px rgba(244, 143, 177, 0.3);
            flex-shrink: 0;
        }

        .logo-placeholder img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        h1 {
            font-family: 'Playfair Display', serif;
            font-weight: 400;
            font-style: italic;
            font-size: clamp(1.4rem, 6vw, 1.8rem);
            color: var(--blush);
            letter-spacing: 1px;
            display: block;
            margin-top: 10px;
        }

        /* --- Pétalos (Capa Superior Total) --- */
        .petal {
            position: fixed;
            pointer-events: none;
            z-index: 9999; /* Por encima de todo el contenido */
            animation: fall linear infinite;
        }

        .petal-rose {
            background-color: #ffb7c5;
            border-radius: 150% 0 150% 0;
            box-shadow: inset -2px -2px 5px rgba(0,0,0,0.05);
        }

        /* Nav y Galería */
        nav {
            position: sticky; top: 0; z-index: 100;
            background: rgba(255, 240, 245, 0.9);
            backdrop-filter: blur(8px);
            padding: 10px 0;
            border-bottom: 1px solid rgba(244, 143, 177, 0.2);
            display: flex; overflow-x: auto; scrollbar-width: none;
        }
        nav::-webkit-scrollbar { display: none; }
        .nav-inner { display: flex; margin: 0 auto; padding: 0 15px; }
        .filter-btn {
            font-family: 'Playfair Display', serif;
            background: none; border: none; padding: 8px 18px;
            font-size: 0.9rem; color: var(--texto); cursor: pointer;
            text-transform: uppercase; letter-spacing: 1px;
        }
        .filter-btn.active { color: var(--blush); font-weight: 600; border-bottom: 2px solid var(--blush); }

        .gallery-container { padding: var(--gap); max-width: 1200px; margin: 0 auto; }
        .masonry-grid { column-count: 2; column-gap: var(--gap); }
        @media (min-width: 768px) { .masonry-grid { column-count: 3; } }
        @media (min-width: 1024px) { .masonry-grid { column-count: 4; } }

        .item { break-inside: avoid; margin-bottom: var(--gap); border-radius: var(--radius); overflow: hidden; background-color: white; box-shadow: 0 5px 15px rgba(244, 143, 177, 0.1); cursor: pointer; }
        .item img { width: 100%; display: block; }

        #lightbox { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255, 240, 245, 0.98); display: none; justify-content: center; align-items: center; z-index: 10000; padding: 15px; }
        #lightbox img { max-width: 100%; max-height: 90vh; border-radius: 15px; box-shadow: 0 10px 40px rgba(0,0,0,0.1); }
        .close-btn { position: absolute; top: 20px; right: 20px; font-size: 35px; color: var(--blush); cursor: pointer; }
    </style>
</head>
<body>

    <div class="logo-container">
        <div class="header-content">
            <img src="https://i.ibb.co/CsDVS7vN/png-clipart-rose-rose-graphic-logo.png" 
                 class="side-rose" 
                 onclick="burstFlowers(this)" 
                 alt="Rosa Decorativa">

            <div class="logo-placeholder">
                <img src="https://i.ibb.co/WWbwnX5D/IMG-20260419-231649.jpg" alt="Logo La Floristería de Bárbara">
            </div>

            <img src="https://i.ibb.co/CsDVS7vN/png-clipart-rose-rose-graphic-logo.png" 
                 class="side-rose" 
                 onclick="burstFlowers(this)" 
                 alt="Rosa Decorativa">
        </div>
        <h1>La Floristería de Bárbara</h1>
    </div>

    <nav id="categories">
        <div class="nav-inner">
            <button class="filter-btn active" onclick="filterGallery('Todas')">Todas</button>
            <button class="filter-btn" onclick="filterGallery('Rosas')">Rosas</button>
            <button class="filter-btn" onclick="filterGallery('Girasoles')">Girasoles</button>
            <button class="filter-btn" onclick="filterGallery('Tulipanes')">Tulipanes</button>
        </div>
    </nav>

    <main class="gallery-container">
        <div class="masonry-grid" id="main-gallery"></div>
    </main>

    <div id="lightbox" onclick="this.style.display='none'">
        <span class="close-btn">&times;</span>
        <img src="" alt="Vista ampliada">
    </div>

    <script>
        const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSffP7BafJvW7W57fmcBo3vkVX7_i9_dVomx_-eONFJHQ5yjwWEVmz1YhNGTiGr5rbGy7-Hy-LmWDjq/pub?output=csv';
        let flowers = [];

        // --- Sistema de Pétalos (Lluvia por toda la pantalla) ---
        function createFlower(isBurst = false) {
            const flower = document.createElement('div');
            flower.className = 'petal petal-rose';
            
            const sizeValue = Math.random() * (isBurst ? 16 : 10) + 8;
            flower.style.width = sizeValue + 'px';
            flower.style.height = (sizeValue * 1.3) + 'px';
            
            // Cubre el 100% del ancho de la pantalla (Viewport Width)
            flower.style.left = Math.random() * 100 + 'vw';
            flower.style.top = '-50px';

            const duration = isBurst ? (Math.random() * 2 + 1.5) : (Math.random() * 4 + 3);
            flower.style.animationDuration = duration + 's';
            
            const colors = ['#F48FB1', '#FCE4EC', '#FFB7C5', '#FF80AB', '#E91E63'];
            flower.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
            
            document.body.appendChild(flower);
            
            setTimeout(() => {
                flower.remove();
            }, duration * 1000);
        }

        // Lluvia ambiental suave
        setInterval(() => createFlower(false), 700);

        // Explosión masiva al tocar las rosas
        function burstFlowers(roseElement) {
            roseElement.classList.add('shaking');
            
            // 60 pétalos cayendo por absolutamente toda la pantalla
            for(let i=0; i<60; i++) {
                setTimeout(() => createFlower(true), i * 25);
            }

            setTimeout(() => {
                roseElement.classList.remove('shaking');
            }, 1200);
        }

        // --- Lógica de Galería ---
        async function loadGallery() {
            try {
                const response = await fetch(CSV_URL);
                const data = await response.text();
                const rows = data.split('\n').slice(1);
                flowers = rows.map(row => {
                    const columns = row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                    return {
                        category: columns[1]?.replace(/"/g, '').trim(),
                        img: columns[3]?.replace(/"/g, '').trim()
                    };
                }).filter(f => f.img && f.img.startsWith('http'));
                renderGallery(flowers);
            } catch (e) {
                console.error("Error cargando datos:", e);
                document.getElementById('main-gallery').innerHTML = "<p>Error al cargar las flores.</p>";
            }
        }

        function renderGallery(items) {
            const grid = document.getElementById('main-gallery');
            grid.innerHTML = '';
            items.forEach(item => {
                const card = document.createElement('div');
                card.className = 'item';
                card.innerHTML = `<img src="${item.img}" loading="lazy">`;
                card.onclick = (e) => {
                    e.stopPropagation();
                    const lb = document.getElementById('lightbox');
                    lb.querySelector('img').src = item.img;
                    lb.style.display = 'flex';
                };
                grid.appendChild(card);
            });
        }

        function filterGallery(cat) {
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.classList.toggle('active', btn.innerText.toUpperCase() === cat.toUpperCase());
            });
            if (cat === 'Todas') {
                renderGallery(flowers);
            } else {
                const filtered = flowers.filter(f => f.category && f.category.toLowerCase() === cat.toLowerCase());
                renderGallery(filtered);
            }
        }

        window.onload = loadGallery;
    </script>
</body>
</html>
